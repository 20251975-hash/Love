<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>연애상담 챗봇</title>

<style>

body{
margin:0;
background:#b2c7da;
font-family:맑은고딕;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chat{

width:420px;
height:700px;

background:white;

border-radius:20px;

overflow:hidden;

display:flex;

flex-direction:column;

box-shadow:0 10px 30px rgba(0,0,0,.2);

}

.header{

background:#FEE500;

padding:18px;

font-size:22px;

font-weight:bold;

text-align:center;

}

#chatBox{

flex:1;

padding:20px;

overflow:auto;

background:#abc1d1;

}

.bot{

background:white;

padding:12px;

border-radius:15px;

margin:10px 0;

max-width:70%;

}

.user{

background:#FEE500;

padding:12px;

border-radius:15px;

margin:10px 0 10px auto;

max-width:70%;

}

.bottom{

display:flex;

padding:10px;

gap:5px;

}

input{

flex:1;

padding:10px;

font-size:16px;

}

button{

padding:10px;

border:none;

background:#FEE500;

cursor:pointer;

}

</style>

</head>

<body>

<div class="chat">

<div class="header">

💕 연애상담 챗봇

</div>

<div id="chatBox">

<div class="bot">

안녕하세요 😊<br>

먼저 CSV파일을 선택해주세요.

</div>

</div>

<div style="padding:10px;">

<input type="file" id="csvFile" accept=".csv">

</div>

<div class="bottom">

<input id="question" placeholder="질문을 입력하세요">

<button onclick="sendMessage()">

전송

</button>

</div>

</div>

<script>

let chatbot=[];

document.getElementById("csvFile").addEventListener("change",function(e){

const file=e.target.files[0];

if(!file)return;

const reader=new FileReader();

reader.onload=function(event){

const text=event.target.result;

const lines=text.trim().split("\n");

chatbot=[];

for(let i=1;i<lines.length;i++){

const row=lines[i].split(",");

chatbot.push({

question:row[0],

answer:row.slice(1).join(",")

});

}

addBot("✅ CSV 불러오기 완료!");

}

reader.readAsText(file,"UTF-8");

});

function addUser(text){

const div=document.createElement("div");

div.className="user";

div.innerHTML=text;

document.getElementById("chatBox").appendChild(div);

scroll();

}

function addBot(text){

const div=document.createElement("div");

div.className="bot";

div.innerHTML=text;

document.getElementById("chatBox").appendChild(div);

scroll();

}

function scroll(){

const box=document.getElementById("chatBox");

box.scrollTop=box.scrollHeight;

}

function sendMessage(){

const input=document.getElementById("question");

const q=input.value.trim();

if(q=="") return;

addUser(q);

input.value="";

let answer="죄송해요. 아직 답변을 찾지 못했어요.";

for(let i=0;i<chatbot.length;i++){

if(q.includes(chatbot[i].question)){

answer=chatbot[i].answer;

break;

}

}

setTimeout(function(){

addBot(answer);

},500);

}

document.getElementById("question").addEventListener("keypress",function(e){

if(e.key==="Enter"){

sendMessage();

}

});

</script>

</body>

</html>
